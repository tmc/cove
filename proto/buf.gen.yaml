version: v2
plugins:
  - remote: buf.build/protocolbuffers/go
    out: .
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: .
    opt:
      - paths=source_relative
  # Swift generation is handled separately via protoc --swift_out
  # because buf does not bundle protoc-gen-swift.
  # Use: make proto-swift
