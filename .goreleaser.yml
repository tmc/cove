version: 2

project_name: cove

before:
  hooks:
    - go mod tidy

builds:
  - id: cove
    main: .
    binary: cove
    goos:
      - darwin
    goarch:
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: vz-agent
    dir: cmd/vz-agent
    binary: vz-agent
    goos:
      - darwin
      - linux
    goarch:
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

# Signing and notarization happen outside goreleaser — see
# scripts/release-local.sh and docs/release-pipeline.md. goreleaser is used
# here only for build + archive + checksum, both in `make release-check`
# (snapshot dry-run) and from inside scripts/release-local.sh before the
# manual codesign / notarytool / stapler pass.

archives:
  - id: cove
    ids:
      - cove
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - internal/autosign/vz.entitlements
      - LICENSE*
      - README*

  - id: vz-agent
    ids:
      - vz-agent
    name_template: "vz-agent_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"

# Homebrew cask publishing was removed when signing moved off CI. The cask
# at tmc/homebrew-tap is now bumped manually after each release; see
# docs/release-pipeline.md for the procedure.

release:
  github:
    owner: tmc
    name: cove
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"
  # The DMG is built and uploaded by a workflow step running after goreleaser.
  # If you add a manually-built DMG to ./dist/ before invoking goreleaser, this
  # block will pick it up; otherwise it is a no-op.
  extra_files:
    - glob: ./dist/cove-*.dmg
  header: |
    ## cove {{ .Tag }}

    macOS and Linux VM management using Apple's Virtualization framework.

    ### Installation

    ```bash
    # Via Homebrew
    brew install tmc/tap/cove

    # Or download the signed + notarized DMG
    # (drag cove onto /usr/local/bin)
    open cove-{{ .Version }}.dmg

    # Or extract the tar.gz
    tar xzf cove_{{ .Version }}_darwin_arm64.tar.gz
    sudo install cove /usr/local/bin/
    ```

    ### Requirements
    - Apple Silicon Mac (M1/M2/M3/M4)
    - macOS 12.0+ (Monterey or later)
  footer: |
    **Full Changelog**: https://github.com/tmc/cove/compare/{{ .PreviousTag }}...{{ .Tag }}
