name: release

# Tag-driven CI for cove. As of 2026-05-02, signing and notarization moved
# off CI entirely — the Developer ID certificate never leaves the maintainer's
# workstation. This workflow only runs tests on tag pushes so that a broken
# tag fails loudly before the local release script runs against it.
#
# To cut a release:
#   1. Tag the commit (git tag -s vX.Y.Z -m "cove vX.Y.Z" && git push --tags)
#   2. Wait for this workflow to go green.
#   3. Run scripts/release-local.sh (or `make release-local`) on a workstation
#      with the Developer ID identity in the login keychain. See
#      docs/release-pipeline.md for the full runbook.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1
