<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>coved</title>
  <style>
    body { font: 14px -apple-system, BlinkMacSystemFont, sans-serif; margin: 24px; color: #111; }
    table { border-collapse: collapse; width: 100%; margin: 16px 0; }
    th, td { border-bottom: 1px solid #ddd; padding: 6px 8px; text-align: left; }
    code, pre { background: #f5f5f5; padding: 2px 4px; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(120px, 1fr)); gap: 12px; }
    .metric { border: 1px solid #ddd; padding: 10px; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>coved</h1>
  <p><a href="/?mode=fleet">fleet view</a> uses <code>cove fleet metrics --json</code> as the matching CLI source.</p>
  <div class="grid" id="summary"></div>
  <h2>Metrics</h2>
  <table><tbody id="metrics"></tbody></table>
  <h2>Recent Events</h2>
  <pre id="events"></pre>
  <script src="/app.js"></script>
</body>
</html>
