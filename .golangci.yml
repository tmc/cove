version: "2"
run:
  build-tags:
    - darwin
linters:
  enable:
    - misspell
    - unconvert
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Printf
        - fmt.Println
        - (io.Closer).Close
    govet:
      disable:
        - fieldalignment
      enable-all: true
    misspell:
      locale: US
    staticcheck:
      checks:
        - all
        - -SA1019
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - unused
        source: func \(.*\) .+\(.*\) {
      - linters:
          - errcheck
        path: _test\.go
      - path: _test\.go
        text: dot-imports
    paths:
      - .*\.pb\.go$
      - .*\.connect\.go$
      - proto/controlpb
      - proto/agentpb
      - proto/agentpbconnect
      - swift
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - .*\.pb\.go$
      - .*\.connect\.go$
      - proto/controlpb
      - proto/agentpb
      - proto/agentpbconnect
      - swift
      - third_party$
      - builtin$
      - examples$
