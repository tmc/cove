run:
  timeout: 5m
  build-tags:
    - darwin

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - unused
    - ineffassign
    - typecheck
    - gofmt
    - misspell
    - unconvert

linters-settings:
  errcheck:
    exclude-functions:
      - fmt.Fprintf
      - fmt.Fprintln
      - fmt.Printf
      - fmt.Println
      - (io.Closer).Close
  govet:
    enable-all: true
    disable:
      - fieldalignment
  misspell:
    locale: US
  staticcheck:
    checks:
      - all
      - -SA1019  # allow deprecated usage (framework APIs evolve)

issues:
  exclude-dirs:
    - proto/controlpb
    - proto/agentpb
    - proto/agentpbconnect
    - swift
  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*\\.connect\\.go$"
  exclude-rules:
    # Allow unused parameters in interface implementations and callbacks
    - linters:
        - unused
      source: "func \\(.*\\) .+\\(.*\\) {"
    # Allow unchecked errors in test files
    - path: _test\.go
      linters:
        - errcheck
    # Allow dot imports in test files
    - path: _test\.go
      text: "dot-imports"
  max-issues-per-linter: 50
  max-same-issues: 10
