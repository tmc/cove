version: 2

project_name: cove

before:
  hooks:
    - go mod tidy

builds:
  - id: cove
    main: .
    binary: cove
    goos:
      - darwin
    goarch:
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: vz-agent
    dir: cmd/vz-agent
    binary: vz-agent
    goos:
      - darwin
      - linux
    goarch:
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

# Sign the cove binary with Developer ID, embed the virtualization
# entitlements, then notarize with notarytool. The keychain identity is
# imported by the release workflow (.github/workflows/release.yml) and
# resolved through MACOS_SIGN_IDENTITY before goreleaser starts.
#
# Notarization uses the App Store Connect notarytool API. The required
# secrets are documented in docs/release-pipeline.md:
#   MACOS_NOTARY_APPLE_ID, MACOS_NOTARY_TEAM_ID, MACOS_NOTARY_APP_PASSWORD.
notarize:
  macos:
    - ids:
        - cove
      enabled: "{{ if index .Env \"MACOS_SIGN_IDENTITY\" }}true{{ else }}false{{ end }}"
      sign:
        certificate: "{{ .Env.MACOS_SIGN_IDENTITY }}"
        password: ""
        entitlements: internal/autosign/vz.entitlements
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_TEAM_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_APPLE_ID }}"
        key: "{{ .Env.MACOS_NOTARY_APP_PASSWORD }}"
        wait: true
        timeout: 20m

archives:
  - id: cove
    ids:
      - cove
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - internal/autosign/vz.entitlements
      - LICENSE*
      - README*

  - id: vz-agent
    ids:
      - vz-agent
    name_template: "vz-agent_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"

# The Homebrew cask points at the tar.gz so users get a fast brew install.
# A signed + notarized DMG is uploaded as a separate release artifact by
# the workflow's `package-dmg` step (see .github/workflows/release.yml);
# the cask `caveats:` mentions it for users who prefer drag-install.
homebrew_casks:
  - name: cove
    ids:
      - cove
    binaries:
      - cove
    homepage: https://github.com/tmc/vz-macos
    description: macOS and Linux VM management using Apple's Virtualization framework
    directory: Casks
    custom_block: |
      depends_on macos: ">= :monterey"
      depends_on arch: :arm64
    repository:
      owner: tmc
      name: homebrew-tap
      branch: "{{.ProjectName}}-{{.Version}}"
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      # The tap's default branch is "master". The release workflow pushes the
      # cask to a side branch (above) and opens a PR against master so the
      # update is reviewed before users see it on `brew install`.
      pull_request:
        enabled: true
        base:
          branch: master
    commit_author:
      name: github-actions
      email: 41898282+github-actions[bot]@users.noreply.github.com
    # Caveats must be a single string: goreleaser emits each newline as a
    # separate Ruby statement inside `caveats do ... end`, and Ruby returns
    # only the last expression — multi-line YAML would silently drop all but
    # the final line.
    caveats: "cove is signed with Developer ID and notarized, so it runs without Gatekeeper prompts. Drag-install users can also grab cove-{{ .Version }}.dmg from the GitHub release page."

release:
  github:
    owner: tmc
    name: vz-macos
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"
  # The DMG is built and uploaded by a workflow step running after goreleaser.
  # If you add a manually-built DMG to ./dist/ before invoking goreleaser, this
  # block will pick it up; otherwise it is a no-op.
  extra_files:
    - glob: ./dist/cove-*.dmg
  header: |
    ## cove {{ .Tag }}

    macOS and Linux VM management using Apple's Virtualization framework.

    ### Installation

    ```bash
    # Via Homebrew
    brew install tmc/tap/cove

    # Or download the signed + notarized DMG
    # (drag cove onto /usr/local/bin)
    open cove-{{ .Version }}.dmg

    # Or extract the tar.gz
    tar xzf cove_{{ .Version }}_darwin_arm64.tar.gz
    sudo install cove /usr/local/bin/
    ```

    ### Requirements
    - Apple Silicon Mac (M1/M2/M3/M4)
    - macOS 12.0+ (Monterey or later)
  footer: |
    **Full Changelog**: https://github.com/tmc/vz-macos/compare/{{ .PreviousTag }}...{{ .Tag }}
